services:
  postgres:
    image: postgres:16
    container_name: xml-benchmark-postgres
    environment:
      POSTGRES_DB: xml_benchmark
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.4
    container_name: xml-benchmark-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
    ports:
      - "9201:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: xml-benchmark-opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Admin123!
      - OPENSEARCH_JAVA_OPTS=-Xms4g -Xmx4g
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  solr:
    image: solr:9.7
    container_name: xml-benchmark-solr
    environment:
      - SOLR_JAVA_MEM=-Xms2g -Xmx2g
    ports:
      - "8983:8983"
    volumes:
      - solr-data:/var/solr
    command:
      - solr-precreate
      - workflow-documents

volumes:
  postgres-data:
  elasticsearch-data:
  opensearch-data:
  solr-data:





